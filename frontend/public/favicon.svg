<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <linearGradient id="mic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a5f3fc" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
  <!-- Sound/AI glow ring -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="url(#glow)" stroke-width="4" stroke-dasharray="8 6" />
  <!-- Microphone head -->
  <rect x="52" y="32" width="24" height="46" rx="12" fill="url(#mic)" />
  <!-- U-shaped bar -->
  <path d="M38 52 C38 78, 90 78, 90 52" fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" />
  <!-- Mic base -->
  <path d="M64 74 L64 96" fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" />
  <path d="M48 96 L80 96" fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" />
</svg>